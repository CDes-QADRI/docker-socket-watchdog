# ╔══════════════════════════════════════════════════════════════╗
# ║              docker-socket-watchdog Configuration          ║
# ╚══════════════════════════════════════════════════════════════╝

sentinel:
  # How often to check containers (in seconds)
  # Default: 300 (5 minutes)
  check_interval_seconds: 1800

  # Maximum restart attempts before giving up on a container
  max_restart_attempts: 2

  # Timeout for restart operation (in seconds)
  restart_timeout: 30

  # ── Resource Monitoring (CPU/RAM Spike Detection) ──
  # Monitor running containers for high resource usage BEFORE they crash
  resource_monitoring:
    enabled: true

    # How often to check resource usage (in seconds)
    # Lower = faster detection but more Docker API calls
    check_interval_seconds: 30

    # RAM usage threshold (percentage, 0-100)
    # Alert when a container exceeds this memory usage
    ram_threshold_percent: 90

    # CPU usage threshold (percentage, 0-100+)
    # 100% = one full core; multi-core containers can exceed 100%
    cpu_threshold_percent: 90

    # How many consecutive threshold breaches before alerting
    # Prevents alerts from brief, harmless spikes
    consecutive_breaches: 2

    # Cooldown between alerts for the SAME container (in seconds)
    # Prevents alert spam if a container stays at high usage
    alert_cooldown_seconds: 300

containers:
  # Watch mode: "all" or "specific"
  # "all"      → Monitor every container on the system
  # "specific" → Only monitor containers listed in specific_names
  watch_mode: "all"

  # If watch_mode is "specific", list container names here
  specific_names:
    # - postgres_db
    # - n8n
    # - ollama
    # - redis

  # Containers to always ignore (even in "all" mode)
  exclude_names:
    # - some_test_container

alerts:
  discord:
    enabled: true

    # Embed styling
    color_critical: 0xFF3838    # Red — container crashed/exited
    color_warning: 0xFFB830     # Amber — container unhealthy
    color_success: 0x2ECC71     # Green — restart successful
    color_info: 0x3B82F6        # Blue — general info
    color_startup: 0xA855F7     # Purple — sentinel started

    # Footer branding
    footer_text: "docker-socket-watchdog"
    footer_icon: "https://cdn-icons-png.flaticon.com/512/5969/5969059.png"
